<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1a2548"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.22" r="0.55">
      <stop offset="0" stop-color="#7c86ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c86ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.18" cy="0.85" r="0.5">
      <stop offset="0" stop-color="#ffd37a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffd37a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="globe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8fd4ff"/>
      <stop offset="1" stop-color="#c6a6ff"/>
    </linearGradient>
    <filter id="pinShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle dot grid -->
  <g fill="#ffffff" fill-opacity="0.04">
    <circle cx="80" cy="80" r="2"/><circle cx="180" cy="80" r="2"/><circle cx="280" cy="80" r="2"/>
    <circle cx="380" cy="80" r="2"/><circle cx="480" cy="80" r="2"/><circle cx="580" cy="80" r="2"/>
    <circle cx="680" cy="80" r="2"/><circle cx="780" cy="80" r="2"/><circle cx="880" cy="80" r="2"/>
    <circle cx="80" cy="180" r="2"/><circle cx="180" cy="180" r="2"/><circle cx="280" cy="180" r="2"/>
    <circle cx="380" cy="180" r="2"/><circle cx="480" cy="180" r="2"/><circle cx="580" cy="180" r="2"/>
    <circle cx="80" cy="280" r="2"/><circle cx="180" cy="280" r="2"/><circle cx="280" cy="280" r="2"/>
    <circle cx="80" cy="380" r="2"/><circle cx="180" cy="380" r="2"/>
    <circle cx="80" cy="480" r="2"/>
    <circle cx="1100" cy="540" r="2"/><circle cx="1100" cy="440" r="2"/><circle cx="1100" cy="340" r="2"/>
    <circle cx="1000" cy="540" r="2"/><circle cx="1000" cy="440" r="2"/>
    <circle cx="900" cy="540" r="2"/>
  </g>

  <!-- Stylised globe on the right -->
  <g transform="translate(870, 315)" filter="url(#cardShadow)">
    <circle r="220" fill="url(#globe)" opacity="0.92"/>
    <circle r="220" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <ellipse rx="220" ry="80" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <ellipse rx="220" ry="140" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <ellipse rx="80" ry="220" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <ellipse rx="140" ry="220" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
  </g>

  <!-- Pins on the globe -->
  <g filter="url(#pinShadow)">
    <!-- Pin 1 -->
    <g transform="translate(820, 200)">
      <circle r="22" fill="#ffd37a" stroke="#ffffff" stroke-width="4"/>
      <circle r="9" fill="#ffffff"/>
    </g>
    <!-- Pin 2 -->
    <g transform="translate(960, 280)">
      <circle r="20" fill="#9bf0b1" stroke="#ffffff" stroke-width="4"/>
      <circle r="8" fill="#ffffff"/>
    </g>
    <!-- Pin 3 -->
    <g transform="translate(770, 380)">
      <circle r="18" fill="#ff9a9a" stroke="#ffffff" stroke-width="4"/>
      <circle r="7" fill="#ffffff"/>
    </g>
    <!-- Pin 4 -->
    <g transform="translate(910, 430)">
      <circle r="16" fill="#c6a6ff" stroke="#ffffff" stroke-width="4"/>
      <circle r="6" fill="#ffffff"/>
    </g>
  </g>

  <!-- Type block -->
  <g transform="translate(80, 230)">
    <text font-size="32" font-weight="700" fill="#ffd37a" letter-spacing="6" textLength="380">PIN THE PLANET</text>
    <text y="120" font-size="120" font-weight="900" fill="#ffffff" letter-spacing="-5">Drop a pin.</text>
    <text y="240" font-size="120" font-weight="900" fill="#ffffff" letter-spacing="-5">Compare the</text>
    <text y="240" x="690" font-size="120" font-weight="900" fill="#ffd37a" letter-spacing="-5">carnage.</text>
    <text y="320" font-size="32" font-weight="600" fill="#a8b1d9">Live multiplayer geography party game.</text>
  </g>

  <!-- URL -->
  <g transform="translate(80, 575)">
    <rect x="-4" y="-30" width="380" height="44" rx="22" fill="#ffffff" fill-opacity="0.08"/>
    <text x="14" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="0.5">🌍 pintheplanet.co.uk</text>
  </g>
</svg>
